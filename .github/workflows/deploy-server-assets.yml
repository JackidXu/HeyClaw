name: Deploy Server Assets to Aliyun OSS

on:
  push:
    branches:
      - main
    paths:
      - 'server-assets/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup OSSUTIL
        uses: manyuanrong/setup-ossutil@master
        with:
          endpoint: ${{ secrets.OSS_ENDPOINT }}
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload Server Assets to Aliyun OSS
        run: ossutil cp -r server-assets/ oss://${{ secrets.OSS_BUCKET }}/heyclaw/server-assets/

