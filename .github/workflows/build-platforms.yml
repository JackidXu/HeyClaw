name: Build Platforms

on:
  workflow_dispatch:
    inputs:
      build_macos:
        description: 'Build macOS'
        required: true
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows'
        required: true
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=8192"

jobs:
  # ========== macOS 构建 ==========
  build-macos:
    if: ${{ github.event_name == 'push' || inputs.build_macos }}
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4
      
      # 使用 setup-node 自带的 cache 功能，完美托管主应用的 npm 全局依赖
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      
      # 显式安装 pnpm，因为底层的 openclaw 框架需要调用它
      - name: Install pnpm
        run: npm install -g pnpm@10

      # 【优化：精准缓存】联合锁死 macOS 下 pnpm 的全局 Store 以及 openclaw 动态下载的本地目录
      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/pnpm
            vendor/openclaw-runtime
            vendor/openclaw-plugins
          key: openclaw-deps-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            openclaw-deps-${{ runner.os }}-${{ matrix.arch }}-
      
      # 若是 tag 触发，则在安装依赖前动态修改 package.json 的版本，确保打包后的版本与 tag 统一
      - name: Sync version to package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          npm version $VERSION --no-git-tag-version --allow-same-version
      
      - run: npm install
      
      # 设置 OpenClaw runtime (如果需要)
      - name: Setup OpenClaw Runtime
        run: |
          if [ -d "vendor/openclaw-runtime/current" ]; then
            echo "✓ OpenClaw runtime found"
          else
            echo "⚠ OpenClaw runtime not found, build may fail"
          fi
      
      - name: Build macOS
        run: |
          if [ -n "${{ secrets.CSC_LINK }}" ]; then
            export CSC_LINK="${{ secrets.CSC_LINK }}"
            export CSC_KEY_PASSWORD="${{ secrets.CSC_KEY_PASSWORD }}"
          fi
          if [ -n "${{ secrets.APPLE_ID }}" ]; then
            export APPLE_ID="${{ secrets.APPLE_ID }}"
            export APPLE_APP_SPECIFIC_PASSWORD="${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
          fi
          npm run dist:mac:${{ matrix.arch }} -- --publish never
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ matrix.arch }}
          path: release/*.dmg
          retention-days: 7

  # ========== Windows 构建 ==========
  build-windows:
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      # Windows 端同样激活 setup-node 的 npm 原生缓存
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      
      # Windows 端同样显式安装 pnpm 供 openclaw 底层消费
      - name: Install pnpm
        run: npm install -g pnpm@10
      
      # 【优化：精准缓存】联合锁死 Windows 端 openclaw 调用 pnpm 时的全局缓存路径与本地目录
      - uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pnpm\Cache
            vendor/openclaw-runtime
            vendor/openclaw-plugins
          key: openclaw-deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            openclaw-deps-${{ runner.os }}-
      
      # 若是 tag 触发，则在安装依赖前动态修改 package.json 的版本，确保打包后的版本与 tag 统一
      - name: Sync version to package.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          npm version $VERSION --no-git-version-keyword --no-git-tag-version --allow-same-version || npm version $VERSION --no-git-tag-version --allow-same-version
      
      - run: npm install
      
      # Windows 需要 Python 运行时
      - name: Setup Python Runtime
        run: npm run setup:python-runtime
        env:
          LOBSTERAI_PORTABLE_PYTHON_ARCHIVE: ${{ secrets.WINDOWS_PYTHON_ARCHIVE }}
      
      - name: Build Windows
        shell: bash
        run: |
          # 如果 WIN_CSC_LINK 既不是有效文件，其长度又明显不是 Base64 证书内容（小于 100 字符），则彻底注销环境变量
          if [[ ! -f "$WIN_CSC_LINK" && ${#WIN_CSC_LINK} -lt 100 ]]; then
            echo "[Codesign] 检测到 WIN_CSC_LINK 为无效占位符 (${WIN_CSC_LINK})，彻底注销签名环境变量以跳过签名。"
            unset WIN_CSC_LINK
            unset CSC_LINK
            unset WIN_CSC_KEY_PASSWORD
            unset CSC_KEY_PASSWORD
          fi
          npm run dist:win -- --publish never
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/*.exe
          retention-days: 7

  # ========== 创建 Release ==========
  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos-build-arm64/*.dmg
            artifacts/macos-build-x64/*.dmg
            artifacts/windows-build/*.exe
          draft: true
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== 自动部署到阿里云 OSS ==========
  deploy-to-oss:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine OSS Path
        run: |
          # 默认使用测试环境路径
          OSS_PATH="heyclaw-dev/downloads"
          
          # 获取包含当前 HEAD 提交的远程分支列表
          BRANCHES=$(git branch -r --contains HEAD)
          echo "Branches containing current commit:"
          echo "$BRANCHES"
          
          # 检查是否包含 origin/main。如果有，说明属于 main 分支的构建
          if echo "$BRANCHES" | grep -qE "origin/main$|origin/main "; then
            OSS_PATH="heyclaw/downloads"
          fi
          
          echo "Determined OSS Path: $OSS_PATH"
          echo "OSS_PATH=$OSS_PATH" >> $GITHUB_ENV

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-files

      - name: Flatten Dist Directory & Generate version.json
        run: |
          # 创建准备 OSS 上传和大文件寻找的临时目录
          mkdir -p oss-dist
          find dist-files/ -type f -name "*.dmg" -exec cp {} oss-dist/ \;
          find dist-files/ -type f -name "*.exe" -exec cp {} oss-dist/ \;
          
          # 提取当前 tag 的版本号
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          # 寻找对应的包文件名
          WIN_FILE=$(cd oss-dist && ls *.exe | head -n 1)
          MAC_ARM64_FILE=$(cd oss-dist && ls *arm64*.dmg | head -n 1)
          MAC_X64_FILE=$(cd oss-dist && ls *x64*.dmg | head -n 1)
          
          # 从 Secrets 读取 CDN 前缀
          CDN_PREFIX="${{ secrets.CDN_URL_PREFIX }}"
          
          # 如果配置了 CDN 前缀，就使用绝对链接；否则回退为相对路径文件名
          if [ -n "$CDN_PREFIX" ]; then
            # 去除末尾斜杠
            CDN_PREFIX="${CDN_PREFIX%/}"
            # 使用动态决定的 OSS_PATH
            WIN_URL="${CDN_PREFIX}/${{ env.OSS_PATH }}/${WIN_FILE}"
            MAC_ARM64_URL="${CDN_PREFIX}/${{ env.OSS_PATH }}/${MAC_ARM64_FILE}"
            MAC_X64_URL="${CDN_PREFIX}/${{ env.OSS_PATH }}/${MAC_X64_FILE}"
          else
            WIN_URL="${WIN_FILE}"
            MAC_ARM64_URL="${MAC_ARM64_FILE}"
            MAC_X64_URL="${MAC_X64_FILE}"
          fi
          
          # 写入 version.json 到 oss-dist 目录以供一并上传到 OSS
          cat <<EOF > oss-dist/version.json
          {
            "version": "${TAG_NAME}",
            "date": "$(date +'%Y-%m-%d')",
            "files": {
              "windows": "${WIN_URL}",
              "mac_x64": "${MAC_X64_URL}",
              "mac_arm64": "${MAC_ARM64_URL}"
            }
          }
          EOF
          
          # 打印 oss-dist 目录下的内容进行验证
          echo "=== Files to upload to OSS (oss-dist) ==="
          ls -la oss-dist/

      - name: Setup OSSUTIL
        uses: manyuanrong/setup-ossutil@master
        with:
          endpoint: ${{ secrets.OSS_ENDPOINT }}
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload Artifacts to Aliyun OSS
        run: ossutil cp -f -r oss-dist/ oss://${{ secrets.OSS_BUCKET }}/${{ env.OSS_PATH }}/